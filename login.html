<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthCheck - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Righteous&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(139, 90, 43, 0.3), rgba(139, 90, 43, 0.05));
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-10px) translateX(-10px); }
            75% { transform: translateY(-30px) translateX(5px); }
        }
        
        .login-container {
            text-align: center;
            z-index: 1;
            position: relative;
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #8b5a2b 0%, #654321 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 15px 40px rgba(139, 90, 43, 0.5);
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            font-size: 8em;
            font-weight: 700;
            font-family: 'Righteous', cursive;
            background: linear-gradient(135deg, #8b5a2b 0%, #654321 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: #d4b896;
            font-size: 1.4em;
            font-weight: 400;
            margin-bottom: 15px;
        }
        
        .team-info {
            color: #a08060;
            font-size: 1.1em;
            font-weight: 300;
            margin-bottom: 50px;
            line-height: 1.6;
        }
        
        .team-name {
            color: #8b5a2b;
            font-weight: 600;
        }
        
        .hint {
            color: #666;
            font-size: 1.1em;
            font-style: italic;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        /* Pop Button - Small and secretive */
        .pop-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: rgba(139, 90, 43, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: 600;
            color: rgba(139, 90, 43, 0.4);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(139, 90, 43, 0.1);
            transition: all 0.3s ease;
            z-index: 10;
            opacity: 0.3;
        }
        
        .pop-button:hover {
            opacity: 1;
            transform: scale(1.15);
            background: rgba(139, 90, 43, 0.3);
            color: rgba(139, 90, 43, 0.9);
            box-shadow: 0 5px 20px rgba(139, 90, 43, 0.3);
        }
        
        .pop-button:active {
            transform: scale(0.95);
        }
        
        /* Pop animation */
        .pop-button.popping {
            animation: popAnimation 0.6s ease-out;
        }
        
        @keyframes popAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* Particles effect */
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #8b5a2b;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 1s ease-out forwards;
        }
        
        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
        
        /* Fade out effect */
        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="login-container" id="loginContainer">
        <div class="logo">✓</div>
        <h1>HELLO</h1>
        <p class="subtitle">TruthCheck - AI-Powered Fact Verification</p>
        <p class="team-info">
            A project by <span class="team-name">Team Hello</span><br>
            Sumay • Aarav • Soumil
        </p>
    </div>
    
    <div class="pop-button" id="popButton">
        pop
    </div>
    
    <script>
        // Create floating orbs
        const bgAnimation = document.getElementById('bgAnimation');
        for (let i = 0; i < 8; i++) {
            const orb = document.createElement('div');
            orb.className = 'floating-orb';
            const size = Math.random() * 100 + 50;
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = Math.random() * 100 + '%';
            orb.style.top = Math.random() * 100 + '%';
            orb.style.animationDelay = Math.random() * 3 + 's';
            orb.style.animationDuration = (Math.random() * 4 + 4) + 's';
            bgAnimation.appendChild(orb);
        }
        
        // Pop button functionality
        const popButton = document.getElementById('popButton');
        const loginContainer = document.getElementById('loginContainer');
        
        popButton.addEventListener('click', function(e) {
            // Create particle explosion
            const rect = popButton.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                const angle = (Math.PI * 2 * i) / 20;
                const distance = 100 + Math.random() * 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
            
            // Animate button
            popButton.classList.add('popping');
            
            // Fade out login container
            setTimeout(() => {
                loginContainer.classList.add('fade-out');
            }, 300);
            
            // Redirect to main page
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 800);
        });
        
        // Easter egg: also allow clicking on the logo
        document.querySelector('.logo').addEventListener('click', function() {
            popButton.click();
        });
    </script>
</body>
</html>
